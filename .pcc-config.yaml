# PCC Multi-Component Configuration
# Generated by PCC workspace-configure
# Date: 2026-02-24

pcc:
  version: "3.0.0"

project:
  name: "MuMain"

# =============================================================================
# TECHNOLOGY PROFILES
# =============================================================================
# Custom profile for C++/CMake game client (no built-in profile exists)

tech_profiles:
  cpp-cmake:
    # Native build (no cross-compilation toolchain). Will fail on macOS (Win32 APIs).
    # On Linux, catches -Werror violations and type errors with native GCC/Clang.
    # CI uses MinGW cross-compilation separately (see MuMain/.github/workflows/ci.yml).
    build: "cmake -S MuMain -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug && cmake --build build -j$(nproc)"
    test: "make -C MuMain test"
    coverage: "echo 'No coverage configured yet'"
    lint: "make -C MuMain lint"
    format: "make -C MuMain format"
    format_check: "make -C MuMain format-check"
    # Local quality gate mirrors CI quality job: format-check + lint (build is CI-only MinGW job)
    quality_gate: "make -C MuMain format-check && make -C MuMain lint"
    clean: "rm -rf build build-mingw build-test"
    # Testing conventions
    testing:
      ac_test_dir: "MuMain/tests"
      ac_test_file_ext: ".cpp"
      test_class_pattern: "*_test.cpp"

  dotnet-aot:
    build: "dotnet build MuMain/ClientLibrary/MUnique.Client.Library.csproj"
    test: "echo 'No .NET tests yet'"
    coverage: "echo 'No coverage configured yet'"
    lint: "dotnet format MuMain/ClientLibrary/MUnique.Client.Library.csproj --verify-no-changes"
    format: "dotnet format MuMain/ClientLibrary/MUnique.Client.Library.csproj"
    quality_gate: "dotnet format MuMain/ClientLibrary/MUnique.Client.Library.csproj --verify-no-changes && dotnet build MuMain/ClientLibrary/MUnique.Client.Library.csproj"
    clean: "dotnet clean MuMain/ClientLibrary/MUnique.Client.Library.csproj"

# =============================================================================
# COMPONENT DEFINITIONS
# =============================================================================

components:
  project-docs:
    path: "./_bmad-output"
    repo: ""
    type: documentation
    tags: [documentation]
    owns:
      - "PRD, architecture, and epic documents"
      - "Story files and implementation artifacts"
      - "API, event, error, and flow catalogs"
      - "Test scenarios and contract documentation"
    artifacts:
      prd: "PRD.md"
      architecture: "architecture.md"
      stories: "stories/"
      contracts: "contracts/"
      epics: "epics/"

  mumain:
    path: "./MuMain"
    repo: "git@github.com:yesid-bocanegra/MuMain.git"
    type: cpp-cmake
    tags: [backend]
    owns:
      - "C++ game client (Season 5.2-6)"
      - "Game loop, rendering, UI, network, all game systems"
      - ".NET Native AOT network bridge (ClientLibrary)"
      - "XSLT code generation (ConstantsReplacer)"
    source: "src/source"
    tests: "tests"

# =============================================================================
# QUALITY GATES
# =============================================================================

quality_gates:
  backend:
    enabled: true
    coverage_threshold: 0   # No tests yet, will increase as tests are added

# =============================================================================
# WORKSPACE CONFIGURATION
# =============================================================================

workspace:
  network_name: "mumain-network"
  gitignore_extras:
    - "build-*/"
    - "*.o"
    - "*.obj"
    - "*.exe"
    - "*.dll"
    - "*.lib"
    - "*.a"
    - "*.so"
    - "*.dylib"
    - "_deps/"
  generated_file_header: true
