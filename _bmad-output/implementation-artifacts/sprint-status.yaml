      description: "Native CI runner provisioning — macOS/Linux runners may require custom hardware or cloud instances"
      affected_stories: [7-4-1-native-ci-runners]
      mitigation: "GitHub Actions supports macOS and Ubuntu runners natively; start with hosted runners, evaluate self-hosted if build times exceed 10 min"

