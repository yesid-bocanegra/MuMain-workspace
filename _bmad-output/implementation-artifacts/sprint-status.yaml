        points: 13
        note: "Critical path — completes EPIC-3 connectivity chain"
      - track_b: "3-1-2 (3) → 3-4-1 (3)"
        points: 6
        note: "Error messaging, parallel with encoding after 3-1-2"
      - track_c: "3-2-1 (5) → 3-3-2 (3)"
        points: 8
        note: "Linux connectivity, parallel with macOS (3-3-1)"
      - track_d: "7-1-2 (3) independent"
        points: 3
        note: "POSIX signal handlers — M1 contribution, no EPIC-3 deps"
    stories_with_no_dependencies:
      - 3-1-2-connection-h-crossplatform    # deps already met: 1.2.2 ✓, 3.1.1 ✓
      - 7-1-2-posix-signal-handlers         # dep already met: 7.1.1 ✓
    stories_that_unblock_other_stories:
      - story: 3-1-2-connection-h-crossplatform
        unblocks: "3-2-1-char16t-encoding, 3-4-1-connection-error-messaging"
      - story: 3-2-1-char16t-encoding
        unblocks: "3-3-1-macos-server-connectivity, 3-3-2-linux-server-connectivity"
      - story: 3-3-1-macos-server-connectivity
        unblocks: "3-4-2-server-connection-config (with 3-3-2)"
      - story: 3-3-2-linux-server-connectivity
        unblocks: "3-4-2-server-connection-config (with 3-3-1)"

  blocking_dependencies:
    - from: 3-1-2-connection-h-crossplatform
      to: 3-2-1-char16t-encoding
      type: sequential
    - from: 3-1-2-connection-h-crossplatform
      to: 3-4-1-connection-error-messaging
      type: sequential
    - from: 3-2-1-char16t-encoding
      to: 3-3-1-macos-server-connectivity
      type: sequential
    - from: 3-2-1-char16t-encoding
      to: 3-3-2-linux-server-connectivity
      type: sequential
    - from: 3-3-1-macos-server-connectivity
      to: 3-4-2-server-connection-config
      type: sequential
    - from: 3-3-2-linux-server-connectivity
      to: 3-4-2-server-connection-config
      type: sequential

  risk_items:
    - id: R6
      description: ".NET AOT native library loading differs per platform (dlopen vs LoadLibrary path resolution)"
      affected_stories: [3-1-2-connection-h-crossplatform, 3-3-1-macos-server-connectivity, 3-3-2-linux-server-connectivity]
      mitigation: "Abstract library loading behind PlatformLibrary; test with stub .so/.dylib first"
      deferred_verification: |
        Story 3.3.2 ATDD items deferred to EPIC-2 (linux runtime not yet available on macOS dev machine):
        - Runtime AC-1/AC-2: mu::platform::Load() + symbol resolution on real Linux x64
        - nm -gD symbol verification on actual .so output
        - cmake --preset linux-x64 configure check with MU_DOTNET_LIB_EXT=.so log output
        These will be re-verified when MuTests can execute on Linux (EPIC-2 removes windows.h PCH dependency).
        Risk R6 mitigation (MU_DOTNET_LIB_DIR absolute path) is in place in code; runtime proof is deferred.
    - id: R7
      description: "char16_t encoding conversion may produce different results on GCC vs MSVC for edge cases"
      affected_stories: [3-2-1-char16t-encoding]
      mitigation: "Unit tests with known packet byte sequences; validate round-trip encoding"
    - id: R8
      description: "POSIX signal handlers may interfere with .NET AOT runtime signal handling"
      affected_stories: [7-1-2-posix-signal-handlers]
      mitigation: "Install signal handlers after .NET AOT init; chain to previous handlers"
    - id: R9
      description: ".NET SDK interop path resolution (WSL → Windows dotnet.exe) fragile for cross-compile"
      affected_stories: [3-3-1-macos-server-connectivity, 3-3-2-linux-server-connectivity]
      mitigation: "CMake detect dotnet at configure time; graceful fallback if missing"

