  blocking_dependencies:
    - from: 5-1-1-muaudio-abstraction-layer
      to: 5-2-1-miniaudio-bgm
      type: sequential
    - from: 5-1-1-muaudio-abstraction-layer
      to: 5-2-2-miniaudio-sfx
      type: sequential
    - from: 5-2-1-miniaudio-bgm
      to: 5-3-1-audio-format-validation
      type: sequential
    - from: 5-2-2-miniaudio-sfx
      to: 5-3-1-audio-format-validation
      type: sequential
    - from: 5-2-1-miniaudio-bgm
      to: 5-4-1-volume-controls
      type: sequential
    - from: 5-2-2-miniaudio-sfx
      to: 5-4-1-volume-controls
      type: sequential

  risk_items:
    - id: R14
      description: "miniaudio library selection — must support WAV, OGG, MP3 decoding and low-latency mixing on all 3 platforms"
      affected_stories: [5-2-1-miniaudio-bgm, 5-2-2-miniaudio-sfx, 5-3-1-audio-format-validation]
      mitigation: "miniaudio is header-only, cross-platform, and supports all required formats; evaluate during 5-1-1 abstraction design"
    - id: R15
      description: "wzAudio removal may break undocumented audio behavior — legacy audio system has minimal documentation"
      affected_stories: [5-1-1-muaudio-abstraction-layer, 5-2-1-miniaudio-bgm]
      mitigation: "Capture audio behavior baseline before migration; test all BGM/SFX triggers against game event catalog"
