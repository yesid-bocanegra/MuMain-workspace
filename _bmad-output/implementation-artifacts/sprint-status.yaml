    # Track A: 3-1-2 (3) → 3-2-1 (5) → 3-3-1 (3) → 3-4-2 (2) = 13 pts (longest chain)
    # Track B: 3-1-2 (3) → 3-4-1 (3) parallel with Track A after 3-1-2
